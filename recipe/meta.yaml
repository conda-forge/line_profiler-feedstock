{% set name = "line_profiler" %}
{% set version = "5.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a80f0afb05ba0d275d9dddc5ff97eab637471167ff3e66dcc7d135755059398c

build:
  number: 0
  script:
    - export CMAKE_OSX_ARCHITECTURES="arm64"  # [osx and arm64]
    - {{ PYTHON }} -m pip install . -vv
  entry_points:
    - kernprof = kernprof:main

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython >=3.0.3                         # [build_platform != target_platform]
    - scikit-build                           # [build_platform != target_platform]
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - python
    - pip
    - cython >=3.0.3
    - scikit-build >=0.17
    - setuptools
  run:
    - python
  run_constrained:
    - ipython >=8.14.0
    - rich >=12.3.0

test:
  imports:
    - kernprof
    - line_profiler
  commands:
    - kernprof --help
    - python -m kernprof --help

about:
  home: https://github.com/pyutils/line_profiler
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: A module for monitoring memory usage of a python program
  dev_url: https://github.com/pyutils/line_profiler
  doc_url: https://github.com/pyutils/line_profiler

extra:
  recipe-maintainers:
    - jakirkham
    - grlee77
    - synapticarbors
